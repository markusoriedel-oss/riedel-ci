<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ferien 26/27">
<title>Ferien Bayern 26/27</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f5f2ee;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: #00102a;
    padding: 52px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-sub  { font-size: 10px; letter-spacing: 2px; color: #786b5a; text-transform: uppercase; margin-bottom: 3px; }
  .header-title { font-size: 18px; font-weight: 300; color: #f2eeea; }
  .legend { display: flex; gap: 14px; margin-top: 9px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #a0927e; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  /* Monate */
  .months { padding: 12px 10px 0; }
  .month-card { background: #fff; border-radius: 10px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

  .month-header {
    background: #00102a;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .month-name { font-size: 13px; font-weight: 500; color: #f2eeea; letter-spacing: .5px; }
  .plan-btn {
    font-size: 10px; background: transparent; border: 1px solid #344;
    color: #786b5a; border-radius: 4px; padding: 3px 7px; cursor: pointer;
  }
  .plan-btn.has-plan { color: #a0e0b0; border-color: #2d7a4f; }

  .plan-bar { background: #f0faf4; border-bottom: 1px solid #d4edda; padding: 6px 12px; font-size: 11px; color: #155724; }

  /* Kalender-Grid */
  .dow-row {
    display: grid; grid-template-columns: repeat(7,1fr);
    background: #f5f2ee;
  }
  .dow-cell { text-align: center; font-size: 9px; font-weight: 500; color: #999; padding: 4px 0; letter-spacing: .5px; }
  .dow-cell.we { color: #ccc; }

  .week-row { display: grid; grid-template-columns: repeat(7,1fr); border-top: 1px solid #f0ede8; }
  .day-cell { text-align: center; padding: 5px 2px; cursor: default; position: relative; min-height: 30px; }
  .day-cell.clickable { cursor: pointer; }
  .day-num { font-size: 12px; font-weight: 300; color: #1a1a1a; display: block; line-height: 1.2; }
  .day-num.we { color: #bbb; }
  .day-num.bold { font-weight: 600; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; margin: 1px auto 0; }

  .day-cell.ferien    { background: #d4edda; }
  .day-cell.feiertag  { background: #f8d7da; }
  .day-cell.schulfrei { background: #fff3cd; }

  .day-cell.ferien    .day-num { color: #155724; }
  .day-cell.feiertag  .day-num { color: #721c24; font-weight: 600; }
  .day-cell.schulfrei .day-num { color: #856404; font-weight: 600; }

  .dot-ferien    { background: #2d7a4f; }
  .dot-feiertag  { background: #c0392b; }
  .dot-schulfrei { background: #d4820a; }

  /* Overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: flex-end;
  }
  .overlay.active { display: flex; }
  .sheet {
    background: #fff; width: 100%; border-radius: 16px 16px 0 0;
    padding: 20px 16px 40px;
  }
  .sheet-title { font-size: 13px; font-weight: 500; color: #00102a; margin-bottom: 12px; }
  .sheet textarea {
    width: 100%; border: 1px solid #d2c6b1; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    resize: none; outline: none; color: #1a1a1a;
  }
  .sheet-btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-save {
    flex: 1; background: #00102a; color: #fff; border: none;
    border-radius: 8px; padding: 12px; font-size: 14px; cursor: pointer;
  }
  .btn-cancel {
    flex: 1; background: #f5f2ee; color: #786b5a;
    border: 1px solid #d2c6b1; border-radius: 8px;
    padding: 12px; font-size: 14px; cursor: pointer;
  }

  /* Tooltip */
  .tooltip {
    display: none; position: fixed; bottom: 80px;
    left: 50%; transform: translateX(-50%);
    background: #fff; border: 1px solid #d2c6b1; border-radius: 10px;
    padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,.15);
    z-index: 100; min-width: 220px; max-width: 300px;
  }
  .tooltip.active { display: block; }
  .tooltip-label { font-size: 12px; font-weight: 500; color: #00102a; margin-bottom: 4px; }
  .tooltip-plan  { font-size: 11px; color: #2d7a4f; margin-bottom: 8px; }
  .tooltip-btn {
    width: 100%; background: #00102a; color: #fff; border: none;
    border-radius: 5px; padding: 8px; font-size: 11px; cursor: pointer;
  }

  .footer { text-align: center; font-size: 9px; color: #ccc; margin-top: 8px; padding: 0 10px; }
</style>
</head>

<div class="header">

<div class="footer">Quelle: Bayerisches Kultusministerium · BayMBl. 2022 Nr. 747</div>

<div class="tooltip" id="tooltip">

</div>

</div>

  { key:"2027-12", name:"Dez 2027", days:[{d:1,w:2},{d:2,w:3},{d:3,w:4},{d:4,w:5},{d:5,w:6},{d:6,w:0},{d:7,w:1},{d:8,w:2},{d:9,w:3},{d:10,w:4},{d:11,w:5},{d:12,w:6},{d:13,w:0},{d:14,w:1},{d:15,w:2},{d:16,w:3},{d:17,w:4},{d:18,w:5},{d:19,w:6},{d:20,w:0},{d:21,w:1},{d:22,w:2},{d:23,w:3},{d:24,w:4,t:"ferien",l:"Weihnachtsferien"},{d:25,w:5,t:"feiertag",l:"1. Weihnachtstag"},{d:26,w:6,t:"feiertag",l:"2. Weihnachtstag"},{d:27,w:0,t:"ferien",l:"Weihnachtsferien"},{d:28,w:1,t:"ferien",l:"Weihnachtsferien"},{d:29,w:2,t:"ferien",l:"Weihnachtsferien"},{d:30,w:3,t:"ferien",l:"Weihnachtsferien"},{d:31,w:4,t:"ferien",l:"Weihnachtsferien"}]},
];

const DOW = ["Mo","Di","Mi","Do","Fr","Sa","So"];
let plans = {};
let activeTooltipKey = null;
let editingKey = null;

// Plans aus localStorage laden
try { plans = JSON.parse(localStorage.getItem("ferienplan") || "{}"); } catch {}

function savePlans() {
  try { localStorage.setItem("ferienplan", JSON.stringify(plans)); } catch {}
}

function buildWeeks(days) {
  const grid = [];
  let week = new Array(7).fill(null);
  days.forEach(day => {
    week[day.w] = day;
    if (day.w === 6) { grid.push([...week]); week = new Array(7).fill(null); }
  });
  if (week.some(x => x !== null)) grid.push(week);
  return grid;
}

function renderMonths() {
  const container = document.getElementById("months");
  container.innerHTML = "";

  MONTHS.forEach(({ key, name, days }) => {
    const hasFerienOrFeiertag = days.some(d => d.t);
    const plan = plans[key];
    const weeks = buildWeeks(days);

    const card = document.createElement("div");
    card.className = "month-card";

    // Header
    const hdr = document.createElement("div");
    hdr.className = "month-header";
    hdr.innerHTML = `<span class="month-name">${name}</span>`;
    if (hasFerienOrFeiertag) {
      const btn = document.createElement("button");
      btn.className = "plan-btn" + (plan ? " has-plan" : "");
      btn.textContent = plan ? "✏️ Plan" : "+ Plan";
      btn.onclick = (e) => { e.stopPropagation(); openEdit(key, name); };
      hdr.appendChild(btn);
    }
    card.appendChild(hdr);

    // Plan-Bar
    if (plan) {
      const bar = document.createElement("div");
      bar.className = "plan-bar";
      bar.textContent = "📌 " + plan;
      card.appendChild(bar);
    }

    // DOW row
    const dowRow = document.createElement("div");
    dowRow.className = "dow-row";
    DOW.forEach((d, i) => {
      const cell = document.createElement("div");
      cell.className = "dow-cell" + (i >= 5 ? " we" : "");
      cell.textContent = d;
      dowRow.appendChild(cell);
    });
    card.appendChild(dowRow);

    // Weeks
    weeks.forEach(week => {
      const row = document.createElement("div");
      row.className = "week-row";
      week.forEach((day, di) => {
        const cell = document.createElement("div");
        if (!day) { cell.className = "day-cell"; row.appendChild(cell); return; }
        const isWe = day.w >= 5;
        cell.className = "day-cell" + (day.t ? " " + day.t : "") + (day.t ? " clickable" : "");
        cell.innerHTML = `<span class="day-num${isWe && !day.t ? " we" : ""}${day.t === "feiertag" || day.t === "schulfrei" ? " bold" : ""}">${day.d}</span>`;
        if (day.t) {
          const dot = document.createElement("div");
          dot.className = "day-dot dot-" + day.t;
          cell.appendChild(dot);
          cell.onclick = (e) => { e.stopPropagation(); showTooltip(day, key); };
        }
        row.appendChild(cell);
      });
      card.appendChild(row);
    });

    container.appendChild(card);
  });
}

function showTooltip(day, key) {
  activeTooltipKey = key;
  const tt = document.getElementById("tooltip");
  document.getElementById("tt-label").textContent = day.l;
  const planEl = document.getElementById("tt-plan");
  const plan = plans[key];
  if (plan) { planEl.textContent = "📌 " + plan; planEl.style.display = "block"; }
  else { planEl.style.display = "none"; }
  document.getElementById("tt-btn").textContent = plan ? "Plan bearbeiten" : "Plan eintragen";
  tt.classList.add("active");
}

document.getElementById("tt-btn").onclick = () => {
  if (!activeTooltipKey) return;
  const month = MONTHS.find(m => m.key === activeTooltipKey);
  document.getElementById("tooltip").classList.remove("active");
  openEdit(activeTooltipKey, month?.name || "");
};

function openEdit(key, name) {
  editingKey = key;
  document.getElementById("sheet-title").textContent = "Plan für " + name;
  document.getElementById("sheet-input").value = plans[key] || "";
  document.getElementById("overlay").classList.add("active");
  setTimeout(() => document.getElementById("sheet-input").focus(), 100);
}

document.getElementById("btn-save").onclick = () => {
  const val = document.getElementById("sheet-input").value.trim();
  if (val) plans[editingKey] = val;
  else delete plans[editingKey];
  savePlans();
  document.getElementById("overlay").classList.remove("active");
  renderMonths();
};

document.getElementById("btn-cancel").onclick = () => {
  document.getElementById("overlay").classList.remove("active");
};

document.addEventListener("click", () => {
  document.getElementById("tooltip").classList.remove("active");
  activeTooltipKey = null;
});

renderMonths();
</script>
