<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ferien 26/27">
<title>Ferien Bayern 26/27</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: #f5f2ee;
  min-height: 100vh;
  padding-bottom: 40px;
}
.header {
  background: #00102a;
  padding: 52px 16px 14px;
  position: sticky; top: 0; z-index: 20;
}
.header-sub { font-size: 10px; letter-spacing: 2px; color: #786b5a; text-transform: uppercase; margin-bottom: 3px; }
.header-title { font-size: 18px; font-weight: 300; color: #f2eeea; }
.legend { display: flex; gap: 12px; margin-top: 9px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #a0927e; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

.months { padding: 12px 10px 0; }
.month-card { background: #fff; border-radius: 10px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.month-header { background: #00102a; padding: 8px 12px; }
.month-name { font-size: 13px; font-weight: 500; color: #f2eeea; letter-spacing: .5px; }

/* Plan-Einträge unter Monatsheader */
.plan-entries { border-bottom: 1px solid #eee; }
.plan-entry {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-bottom: 1px solid #f5f2ee;
  cursor: pointer;
}
.plan-entry:last-child { border-bottom: none; }
.plan-entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.plan-entry-text { flex: 1; }
.plan-entry-dates { font-size: 10px; color: #999; }
.plan-entry-label { font-size: 12px; color: #1a1a1a; margin-top: 1px; }
.plan-entry-del { font-size: 16px; color: #ddd; padding: 0 4px; cursor: pointer; }

.dow-row { display: grid; grid-template-columns: repeat(7,1fr); background: #f5f2ee; }
.dow-cell { text-align: center; font-size: 9px; font-weight: 500; color: #999; padding: 4px 0; letter-spacing: .5px; }
.dow-cell.we { color: #ccc; }

.week-row { display: grid; grid-template-columns: repeat(7,1fr); border-top: 1px solid #f0ede8; }
.day-cell { text-align: center; padding: 4px 1px; cursor: pointer; position: relative; min-height: 32px; user-select: none; }
.day-num { font-size: 12px; display: block; line-height: 1.2; color: #1a1a1a; font-weight: 300; }
.day-num.we { color: #ccc; }
.day-num.bold { font-weight: 600; }
.day-dot { width: 4px; height: 4px; border-radius: 50%; margin: 1px auto 0; }

/* Kalender-Markierungen */
.day-cell.ferien    { background: #d4edda; }
.day-cell.feiertag  { background: #f8d7da; }
.day-cell.schulfrei { background: #fff3cd; }
.day-cell.ferien    .day-num { color: #155724; }
.day-cell.feiertag  .day-num { color: #721c24; font-weight: 600; }
.day-cell.schulfrei .day-num { color: #856404; font-weight: 600; }
.dot-ferien    { background: #2d7a4f; }
.dot-feiertag  { background: #c0392b; }
.dot-schulfrei { background: #d4820a; }

/* Plan-Farbbalken auf Tag */
.plan-bar-day {
  position: absolute; bottom: 2px; left: 1px; right: 1px;
  height: 3px; border-radius: 2px;
}

/* Overlay / Sheet */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end;
}
.overlay.active { display: flex; }
.sheet {
  background: #fff; width: 100%;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px 44px;
  max-height: 90vh; overflow-y: auto;
}
.sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 15px; font-weight: 500; color: #00102a; margin-bottom: 16px; }

.form-row { margin-bottom: 14px; }
.form-label { font-size: 11px; color: #999; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; border: 1px solid #d2c6b1; border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  outline: none; color: #1a1a1a; background: #fff;
  -webkit-appearance: none;
}
.form-input:focus { border-color: #786b5a; }
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* Farbwahl */
.color-row { display: flex; gap: 8px; margin-top: 4px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform .1s;
}
.color-swatch.selected { border-color: #00102a; transform: scale(1.15); }

.sheet-btns { display: flex; gap: 8px; margin-top: 16px; }
.btn-save {
  flex: 1; background: #00102a; color: #fff; border: none;
  border-radius: 8px; padding: 13px; font-size: 14px; cursor: pointer;
}
.btn-cancel {
  flex: 1; background: #f5f2ee; color: #786b5a;
  border: 1px solid #d2c6b1; border-radius: 8px;
  padding: 13px; font-size: 14px; cursor: pointer;
}
.footer { text-align: center; font-size: 9px; color: #ccc; margin-top: 8px; padding: 0 10px; }
</style>
</head>

      </div>
    </div>
    <div class="form-row">

    <div class="sheet-btns">

  { key:"2027-11", name:"Nov 2027", days:[{d:1,w:0,t:"feiertag",l:"Allerheiligen"},{d:2,w:1,t:"ferien",l:"Herbstferien"},{d:3,w:2,t:"ferien",l:"Herbstferien"},{d:4,w:3,t:"ferien",l:"Herbstferien"},{d:5,w:4,t:"ferien",l:"Herbstferien"},{d:6,w:5},{d:7,w:6},{d:8,w:0},{d:9,w:1},{d:10,w:2},{d:11,w:3},{d:12,w:4},{d:13,w:5},{d:14,w:6},{d:15,w:0},{d:16,w:1},{d:17,w:2,t:"schulfrei",l:"Buß- u. Bettag"},{d:18,w:3},{d:19,w:4},{d:20,w:5},{d:21,w:6},{d:22,w:0},{d:23,w:1},{d:24,w:2},{d:25,w:3},{d:26,w:4},{d:27,w:5},{d:28,w:6},{d:29,w:0},{d:30,w:1}]},
  { key:"2027-12", name:"Dez 2027", days:[{d:1,w:2},{d:2,w:3},{d:3,w:4},{d:4,w:5},{d:5,w:6},{d:6,w:0},{d:7,w:1},{d:8,w:2},{d:9,w:3},{d:10,w:4},{d:11,w:5},{d:12,w:6},{d:13,w:0},{d:14,w:1},{d:15,w:2},{d:16,w:3},{d:17,w:4},{d:18,w:5},{d:19,w:6},{d:20,w:0},{d:21,w:1},{d:22,w:2},{d:23,w:3},{d:24,w:4,t:"ferien",l:"Weihnachtsferien"},{d:25,w:5,t:"feiertag",l:"1. Weihnachtstag"},{d:26,w:6,t:"feiertag",l:"2. Weihnachtstag"},{d:27,w:0,t:"ferien",l:"Weihnachtsferien"},{d:28,w:1,t:"ferien",l:"Weihnachtsferien"},{d:29,w:2,t:"ferien",l:"Weihnachtsferien"},{d:30,w:3,t:"ferien",l:"Weihnachtsferien"},{d:31,w:4,t:"ferien",l:"Weihnachtsferien"}]},
];

// Ferienblock-Lookup: Datum (YYYY-MM-DD) → Block-Name + Start/End
const FERIEN_BLOCKS = [
  { name:"Herbstferien 2026",     from:"2026-11-01", to:"2026-11-06" },
  { name:"Weihnachtsferien 26/27",from:"2026-12-24", to:"2027-01-08" },
  { name:"Frühjahrsferien 2027",  from:"2027-02-08", to:"2027-02-12" },
  { name:"Osterferien 2027",      from:"2027-03-22", to:"2027-04-02" },
  { name:"Chr. Himmelfahrt",      from:"2027-05-06", to:"2027-05-06" },
  { name:"Pfingstferien 2027",    from:"2027-05-17", to:"2027-05-28" },
  { name:"Sommerferien 2027",     from:"2027-08-02", to:"2027-09-13" },
  { name:"Herbstferien 2027",     from:"2027-11-01", to:"2027-11-05" },
  { name:"Weihnachtsferien 2027", from:"2027-12-24", to:"2028-01-09" },
];

const PLAN_COLORS = ["#e67e22","#2980b9","#8e44ad","#27ae60","#c0392b","#16a085"];

// ── Pläne – werden durch Claude direkt hier eingebettet ────────────────────
let PLANS = [];
// PLANS_PLACEHOLDER

// ── Hilfsfunktionen ────────────────────────────────────────────────────────
function dateStr(year, month, day) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function blockForDate(ds) {
  return FERIEN_BLOCKS.find(b => ds >= b.from && ds <= b.to) || null;
}

function plansForDate(ds) {
  return PLANS.filter(p => ds >= p.from && ds <= p.to);
}

function plansForMonth(mkey) {
  const [y, m] = mkey.split('-').map(Number);
  const mo = MONTHS.find(x => x.key === mkey);
  if (!mo) return [];
  const seen = new Set();
  const result = [];
  mo.days.forEach(day => {
    const ds = dateStr(y, m, day.d);
    PLANS.forEach(p => {
      if (ds >= p.from && ds <= p.to && !seen.has(p.id)) {
        seen.add(p.id);
        result.push(p);
      }
    });
  });
  return result;
}

function buildWeeks(days) {
  const grid = [];
  let week = new Array(7).fill(null);
  days.forEach(day => {
    week[day.w] = day;
    if (day.w === 6) { grid.push([...week]); week = new Array(7).fill(null); }
  });
  if (week.some(x => x !== null)) grid.push(week);
  return grid;
}

function fmtDate(ds) {
  if (!ds) return '';
  const [y,m,d] = ds.split('-');
  return `${d}.${m}.${y}`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderMonths() {
  const container = document.getElementById("months");
  container.innerHTML = "";

  MONTHS.forEach(({ key, name, days }) => {
    const [y, m] = key.split('-').map(Number);
    const weeks = buildWeeks(days);
    const monthPlans = plansForMonth(key);

    const card = document.createElement("div");
    card.className = "month-card";

    // Header
    const hdr = document.createElement("div");
    hdr.className = "month-header";
    hdr.innerHTML = `<span class="month-name">${name}</span>`;
    card.appendChild(hdr);

    // Plan-Einträge
    if (monthPlans.length > 0) {
      const pe = document.createElement("div");
      pe.className = "plan-entries";
      monthPlans.forEach(p => {
        const row = document.createElement("div");
        row.className = "plan-entry";
        row.innerHTML = `
          <div class="plan-entry-dot" style="background:${p.color}"></div>
          <div class="plan-entry-text">
            <div class="plan-entry-dates">${fmtDate(p.from)} – ${fmtDate(p.to)}</div>
            <div class="plan-entry-label">${p.desc}</div>
          </div>
          <div class="plan-entry-del" data-id="${p.id}">×</div>`;
        row.querySelector('.plan-entry-del').onclick = (e) => {
          e.stopPropagation();
          deletePlan(p.id);
        };
        row.onclick = () => openEdit(p);
        pe.appendChild(row);
      });
      card.appendChild(pe);
    }

    // DOW
    const dowRow = document.createElement("div");
    dowRow.className = "dow-row";
    ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach((d, i) => {
      const c = document.createElement("div");
      c.className = "dow-cell" + (i >= 5 ? " we" : "");
      c.textContent = d;
      dowRow.appendChild(c);
    });
    card.appendChild(dowRow);

    // Wochen
    weeks.forEach(week => {
      const row = document.createElement("div");
      row.className = "week-row";
      week.forEach((day) => {
        const cell = document.createElement("div");
        if (!day) { cell.className = "day-cell"; row.appendChild(cell); return; }
        const isWe = day.w >= 5;
        const ds = dateStr(y, m, day.d);
        cell.className = "day-cell" + (day.t ? " " + day.t : "");
        cell.innerHTML = `<span class="day-num${isWe && !day.t ? " we" : ""}${day.t === "feiertag" || day.t === "schulfrei" ? " bold" : ""}">${day.d}</span>`;

        // Plan-Farbbalken
        const dayPlans = plansForDate(ds);
        if (dayPlans.length > 0) {
          const bar = document.createElement("div");
          bar.className = "plan-bar-day";
          bar.style.background = dayPlans[0].color;
          if (dayPlans.length > 1) {
            bar.style.background = `linear-gradient(to right, ${dayPlans.map(p=>p.color).join(', ')})`;
          }
          cell.appendChild(bar);
        }

        cell.onclick = () => openNew(ds, day.t, day.l);
        row.appendChild(cell);
      });
      card.appendChild(row);
    });

    container.appendChild(card);
  });
}

// ── Sheet-Logik ────────────────────────────────────────────────────────────
let editingId = null;
let selectedColor = PLAN_COLORS[0];

// Farb-Swatches aufbauen
const colorRow = document.getElementById("color-row");
PLAN_COLORS.forEach((c, i) => {
  const sw = document.createElement("div");
  sw.className = "color-swatch" + (i === 0 ? " selected" : "");
  sw.style.background = c;
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedColor = c;
  };
  colorRow.appendChild(sw);
});

function setColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.classList.toggle('selected', sw.style.background === c || sw.style.backgroundColor === c);
  });
}

function openNew(ds, type, label) {
  // Wenn bereits ein Plan auf diesem Tag liegt → diesen bearbeiten
  const existing = plansForDate(ds);
  if (existing.length > 0) { openEdit(existing[0]); return; }

  editingId = null;
  document.getElementById("sheet-title").textContent = label ? label : "Eintrag planen";
  document.getElementById("input-desc").value = "";

  // Von/Bis automatisch auf Ferienblock setzen
  const block = blockForDate(ds);
  document.getElementById("input-from").value = block ? block.from : ds;
  document.getElementById("input-to").value   = block ? block.to   : ds;

  setColor(PLAN_COLORS[0]);
  document.getElementById("overlay").classList.add("active");
  setTimeout(() => document.getElementById("input-desc").focus(), 150);
}

function openEdit(plan) {
  editingId = plan.id;
  document.getElementById("sheet-title").textContent = "Eintrag bearbeiten";
  document.getElementById("input-desc").value  = plan.desc;
  document.getElementById("input-from").value  = plan.from;
  document.getElementById("input-to").value    = plan.to;
  setColor(plan.color);
  document.getElementById("overlay").classList.add("active");
}

document.getElementById("btn-save").onclick = () => {
  const desc = document.getElementById("input-desc").value.trim();
  const from = document.getElementById("input-from").value;
  const to   = document.getElementById("input-to").value;
  if (!desc || !from || !to) return;

  if (editingId) {
    const idx = PLANS.findIndex(p => p.id === editingId);
    if (idx >= 0) PLANS[idx] = { id: editingId, desc, from, to, color: selectedColor };
  } else {
    PLANS.push({ id: Date.now().toString(), desc, from, to, color: selectedColor });
  }

  document.getElementById("overlay").classList.remove("active");
  renderMonths();
};

document.getElementById("btn-cancel").onclick = () => {
  document.getElementById("overlay").classList.remove("active");
};

document.getElementById("overlay").onclick = (e) => {
  if (e.target === document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("active");
};

function deletePlan(id) {
  if (!confirm("Eintrag löschen?")) return;
  PLANS = PLANS.filter(p => p.id !== id);
  renderMonths();
}

renderMonths();
</script>
